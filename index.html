<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>基金数据查询 - 累计净值计算版（校准官方）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; padding: 20px; color: #1f2d3d; }
        .container { max-width: 1300px; margin: 0 auto; }
        .search-card { background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 24px 28px; margin-bottom: 28px; }
        .search-box { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 16px; }
        .input-group { flex: 2; min-width: 200px; }
        .input-group label { display: block; font-size: 14px; font-weight: 500; color: #5a6874; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #dcdfe6; border-radius: 14px; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: #e6352c; box-shadow: 0 0 0 3px rgba(230,53,44,0.1); }
        .btn-query { background: #e6352c; color: white; border: none; padding: 12px 32px; font-size: 16px; font-weight: 600; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .btn-query:hover { background: #c42820; transform: translateY(-1px); }
        .info-card { background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px 28px; margin-bottom: 28px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .fund-name { font-size: 1.6rem; font-weight: 700; color: #1e2a3a; }
        .fund-code { font-size: 1rem; color: #7e8c8f; margin-left: 12px; }
        .fund-scale { background: #fef2e9; padding: 8px 20px; border-radius: 40px; color: #e67e22; font-weight: 600; }
        .fund-scale span { font-size: 1.3rem; font-weight: 800; margin-right: 4px; }
        .section-card { background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 28px; overflow-x: auto; padding: 8px 0; }
        .section-title { font-size: 1.3rem; font-weight: 700; padding: 18px 24px 8px 24px; color: #1f2d3d; border-left: 5px solid #e6352c; }
        .fund-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 680px; }
        .fund-table th { background: #f8fafc; padding: 14px 12px; text-align: center; font-weight: 600; color: #4a5b6e; border-bottom: 1px solid #e9edf2; }
        .fund-table td { padding: 12px 12px; text-align: center; border-bottom: 1px solid #f0f2f5; }
        .positive { color: #e6352c; font-weight: 500; }
        .negative { color: #2d9c6b; font-weight: 500; }
        .neutral { color: #7f8c8d; }
        .loading-text { text-align: center; padding: 48px; color: #8a9cb0; }
        .error-msg { background: #fee9e6; color: #c0392b; border-radius: 16px; padding: 14px 20px; margin: 16px 24px; text-align: center; }
        .footnote { text-align: right; font-size: 12px; color: #95a5a6; padding: 12px 24px 20px; border-top: 1px solid #edf2f7; margin-top: 8px; }
        @media (max-width: 700px) { .fund-name { font-size: 1.2rem; } .section-title { font-size: 1.1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="search-card">
        <div class="search-box">
            <div class="input-group">
                <label>🐔 基金代码 (例如: 000001, 110011, 005827)</label>
                <input type="text" id="fundCodeInput" placeholder="输入6位基金代码" value="018561" maxlength="6">
            </div>
            <button class="btn-query" id="searchBtn">🔍 查询基金</button>
        </div>
        <div class="footnote" style="border:none; padding:12px 0 0 0;">数据源：天天基金累计净值（校准官方涨幅）</div>
    </div>

    <div id="fundInfoArea" class="info-card" style="display: none;"></div>
    <div id="phaseReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📈 阶段涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table">
                <thead><tr><th>近1周</th><th>近1月</th><th>近3月</th><th>近6月</th><th>今年来</th><th>近1年</th><th>近2年</th><th>近3年</th></tr></thead>
                <tbody id="phaseBody"><tr><td colspan="8" class="loading-text">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
    <div id="quarterReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📆 季度涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table">
                <thead><tr><th>季度</th><th>阶段涨幅</th></tr></thead>
                <tbody id="quarterBody"><tr><td colspan="2" class="loading-text">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
    <div id="yearReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📅 年度涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table">
                <thead><tr><th>年度</th><th>阶段涨幅</th></tr></thead>
                <tbody id="yearBody"><tr><td colspan="2" class="loading-text">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 加载基金数据（使用累计净值 Data_ACWorthTrend）
    function loadFundData(code) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const url = `https://fund.eastmoney.com/pingzhongdata/${code}.js`;
            let resolved = false;
            const timeout = setTimeout(() => {
                if (!resolved) reject(new Error('请求超时，请检查网络或基金代码'));
            }, 15000);
            
            const backup = {};
            const vars = ['fS_name', 'Data_ACWorthTrend', 'Data_fluctuationScale'];
            vars.forEach(v => { if (window[v] !== undefined) { backup[v] = window[v]; delete window[v]; } });
            
            script.onload = () => {
                resolved = true;
                clearTimeout(timeout);
                try {
                    const name = window.fS_name || '未知基金';
                    // 优先使用累计净值 Data_ACWorthTrend，若不存在则回退单位净值 Data_netWorthTrend
                    let worthData = window.Data_ACWorthTrend || window.Data_netWorthTrend || [];
                    let scale = null;
                    if (window.Data_fluctuationScale && window.Data_fluctuationScale.series && window.Data_fluctuationScale.series.length) {
                        const last = window.Data_fluctuationScale.series[window.Data_fluctuationScale.series.length - 1];
                        scale = last.y;
                    }
                    vars.forEach(v => delete window[v]);
                    Object.assign(window, backup);
                    
                    if (!Array.isArray(worthData) || worthData.length === 0) throw new Error('净值数据为空');
                    // 过滤无效数据
                    worthData = worthData.filter(item => item && typeof item[0] === 'number' && typeof item[1] === 'number');
                    if (worthData.length === 0) throw new Error('没有有效的净值数据');
                    
                    // 转换为对象数组 { x: 时间戳, y: 累计净值 }
                    const netWorth = worthData.map(item => ({ x: item[0], y: item[1] }));
                    resolve({ name, netWorth, scale });
                } catch (e) {
                    reject(e);
                } finally {
                    script.remove();
                }
            };
            script.onerror = () => {
                resolved = true;
                clearTimeout(timeout);
                reject(new Error('基金数据加载失败，请检查代码是否正确'));
            };
            script.src = url;
            document.head.appendChild(script);
        });
    }

    // 根据时间戳（毫秒）获取最接近且不大于该时间的净值（二分查找）
    function getClosestNetValue(sorted, targetTimestamp) {
        if (sorted.length === 0) return null;
        let left = 0, right = sorted.length - 1;
        let result = null;
        while (left <= right) {
            const mid = Math.floor((left + right) / 2);
            if (sorted[mid].x <= targetTimestamp) {
                result = sorted[mid];
                left = mid + 1;
            } else {
                right = mid - 1;
            }
        }
        return result ? result.y : null;
    }

    // 计算两个日期间的涨幅（自然日）
    function calcReturnByDays(sorted, latestDate, daysAgo) {
        const targetTime = latestDate.getTime() - daysAgo * 86400000;
        const oldNav = getClosestNetValue(sorted, targetTime);
        const latestNav = sorted[sorted.length - 1].y;
        if (oldNav === null || oldNav === 0) return null;
        return (latestNav - oldNav) / oldNav * 100;
    }

    // 计算今年以来涨幅
    function computeYtdReturn(sorted, latestDate) {
        const currentYear = latestDate.getFullYear();
        const yearStart = new Date(currentYear, 0, 1);
        const startNav = getClosestNetValue(sorted, yearStart.getTime());
        const latestNav = sorted[sorted.length - 1].y;
        if (startNav === null || startNav === 0) return null;
        return (latestNav - startNav) / startNav * 100;
    }

    // 阶段涨幅（自然日）
    function computePhaseReturns(sorted) {
        const latestDate = new Date(sorted[sorted.length - 1].x);
        return {
            one_week: calcReturnByDays(sorted, latestDate, 7),
            one_month: calcReturnByDays(sorted, latestDate, 30),
            three_month: calcReturnByDays(sorted, latestDate, 90),
            six_month: calcReturnByDays(sorted, latestDate, 180),
            year_to_date: computeYtdReturn(sorted, latestDate),
            one_year: calcReturnByDays(sorted, latestDate, 365),
            two_year: calcReturnByDays(sorted, latestDate, 730),
            three_year: calcReturnByDays(sorted, latestDate, 1095)
        };
    }

    // 季度涨幅（自然季度）
    function computeQuarterReturns(sorted) {
        const quarters = new Map();
        for (let i = 0; i < sorted.length; i++) {
            const d = new Date(sorted[i].x);
            const year = d.getFullYear();
            const quarter = Math.floor(d.getMonth() / 3) + 1;
            const key = `${year}年${quarter}季度`;
            if (!quarters.has(key)) {
                quarters.set(key, { firstNav: sorted[i].y, lastNav: sorted[i].y });
            } else {
                const q = quarters.get(key);
                q.lastNav = sorted[i].y;
            }
        }
        const result = [];
        for (let [quarter, { firstNav, lastNav }] of quarters.entries()) {
            const ret = (lastNav - firstNav) / firstNav * 100;
            result.push({ quarter, return_rate: isNaN(ret) ? '--' : ret.toFixed(2) });
        }
        // 按时间倒序
        result.sort((a, b) => {
            const getVal = (q) => {
                if (!q) return 0;
                const m = q.match(/(\d{4})年(\d+)季度/);
                return m ? parseInt(m[1]) * 10 + parseInt(m[2]) : 0;
            };
            return getVal(b.quarter) - getVal(a.quarter);
        });
        return result;
    }

    // 年度涨幅
    function computeYearReturns(sorted) {
        const years = new Map();
        for (let i = 0; i < sorted.length; i++) {
            const d = new Date(sorted[i].x);
            const year = d.getFullYear();
            if (!years.has(year)) {
                years.set(year, { firstNav: sorted[i].y, lastNav: sorted[i].y });
            } else {
                const y = years.get(year);
                y.lastNav = sorted[i].y;
            }
        }
        const result = [];
        for (let [year, { firstNav, lastNav }] of years.entries()) {
            const ret = (lastNav - firstNav) / firstNav * 100;
            result.push({ year: year.toString(), return_rate: isNaN(ret) ? '--' : ret.toFixed(2) });
        }
        result.sort((a, b) => parseInt(b.year) - parseInt(a.year));
        return result;
    }

    // 渲染函数（与之前相同，略）
    function formatPercent(value) {
        if (value === undefined || value === null || value === '') return '<span class="neutral">--</span>';
        let num = parseFloat(value);
        if (isNaN(num)) return `<span class="neutral">${escapeHtml(String(value))}</span>`;
        const formatted = num.toFixed(2);
        if (num > 0) return `<span class="positive">+${formatted}%</span>`;
        if (num < 0) return `<span class="negative">${formatted}%</span>`;
        return `<span class="neutral">${formatted}%</span>`;
    }
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function renderFundInfo(name, scale, code) {
        const area = document.getElementById('fundInfoArea');
        let scaleText = '暂无规模数据';
        if (scale !== undefined && scale !== null) {
            let num = parseFloat(scale);
            if (!isNaN(num)) scaleText = `${num.toFixed(2)} 亿元`;
            else scaleText = String(scale);
        }
        area.innerHTML = `<div style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:12px;">
            <div><span class="fund-name">${escapeHtml(name)}</span><span class="fund-code">(${escapeHtml(code)})</span></div>
            <div class="fund-scale">📊 最新规模 <span>${escapeHtml(scaleText)}</span></div>
        </div>`;
        area.style.display = 'flex';
    }
    function renderPhaseReturns(phase) {
        const tbody = document.getElementById('phaseBody');
        if (!phase) { tbody.innerHTML = '<tr><td colspan="8" class="neutral">暂无数据</td></tr>'; return; }
        const order = ['one_week', 'one_month', 'three_month', 'six_month', 'year_to_date', 'one_year', 'two_year', 'three_year'];
        let html = '<tr>';
        for (let key of order) html += `<td>${formatPercent(phase[key])}</td>`;
        html += '</tr>';
        tbody.innerHTML = html;
    }
    function renderQuarterReturns(quarters) {
        const tbody = document.getElementById('quarterBody');
        if (!quarters.length) { tbody.innerHTML = '<tr><td colspan="2" class="neutral">暂无季度数据</td></tr>'; return; }
        let html = '';
        for (let q of quarters.slice(0, 12)) {
            html += `<tr><td style="font-weight:500;">${escapeHtml(q.quarter)}</td><td>${formatPercent(q.return_rate)}</td></tr>`;
        }
        tbody.innerHTML = html;
    }
    function renderYearReturns(years) {
        const tbody = document.getElementById('yearBody');
        if (!years.length) { tbody.innerHTML = '<tr><td colspan="2" class="neutral">暂无年度数据</td></tr>'; return; }
        let html = '';
        for (let y of years) {
            html += `<tr><td style="font-weight:500;">${escapeHtml(y.year)}</td><td>${formatPercent(y.return_rate)}</td></tr>`;
        }
        tbody.innerHTML = html;
    }
    function showLoadingState() {
        document.getElementById('fundInfoArea').style.display = 'none';
        document.getElementById('phaseReturnArea').style.display = 'block';
        document.getElementById('quarterReturnArea').style.display = 'block';
        document.getElementById('yearReturnArea').style.display = 'block';
        document.getElementById('phaseBody').innerHTML = '<tr><td colspan="8" class="loading-text">⏳ 计算阶段涨幅中...</td></tr>';
        document.getElementById('quarterBody').innerHTML = '<tr><td colspan="2" class="loading-text">⏳ 计算季度涨幅中...</td></tr>';
        document.getElementById('yearBody').innerHTML = '<tr><td colspan="2" class="loading-text">⏳ 计算年度涨幅中...</td></tr>';
        document.querySelectorAll('.error-msg').forEach(el => el.remove());
    }
    function showGlobalError(msg) {
        const phaseArea = document.getElementById('phaseReturnArea');
        document.querySelectorAll('.error-msg').forEach(el => el.remove());
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.innerHTML = `❌ 查询失败: ${escapeHtml(msg)}<br>请核对基金代码或稍后再试`;
        phaseArea.insertAdjacentElement('afterbegin', errDiv);
        document.getElementById('phaseBody').innerHTML = `<tr><td colspan="8" class="neutral">${escapeHtml(msg)}</td></tr>`;
        document.getElementById('quarterBody').innerHTML = '<tr><td colspan="2" class="neutral">无法获取季度数据</td></tr>';
        document.getElementById('yearBody').innerHTML = '<tr><td colspan="2" class="neutral">无法获取年度数据</td></tr>';
        document.getElementById('fundInfoArea').style.display = 'none';
    }

    async function queryFund(code) {
        if (!/^\d{6}$/.test(code)) { showGlobalError('基金代码必须是6位数字'); return; }
        showLoadingState();
        try {
            const { name, netWorth, scale } = await loadFundData(code);
            const sorted = [...netWorth].sort((a,b) => a.x - b.x);
            const phase = computePhaseReturns(sorted);
            const quarters = computeQuarterReturns(sorted);
            const years = computeYearReturns(sorted);
            renderFundInfo(name, scale, code);
            renderPhaseReturns(phase);
            renderQuarterReturns(quarters);
            renderYearReturns(years);
        } catch (err) {
            console.error(err);
            showGlobalError(err.message || '数据加载失败，请检查代码');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const searchBtn = document.getElementById('searchBtn');
        const inputEl = document.getElementById('fundCodeInput');
        const perform = () => queryFund(inputEl.value.trim());
        searchBtn.addEventListener('click', perform);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') perform(); });
        queryFund('018561');
    });
</script>
</body>
</html>
