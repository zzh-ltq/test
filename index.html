<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>基金交易费率查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {background-color: #f5f7fa;}
        .card {background: #fff;border-radius: 10px;box-shadow: 0 2px 10px #00000012;}
        .title-line {border-left:4px solid #165DFF;padding-left:10px;}
        table {width:100%;border-collapse:collapse;}
        th,td {border:1px solid #eee;padding:10px;text-align:center;}
        th {background:#f9fafb;}
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-6">基金交易信息查询</h1>

        <!-- 搜索栏 -->
        <div class="card p-5 mb-5">
            <div class="flex gap-3">
                <input id="kw" type="text" placeholder="输入基金代码/基金名称"
                    class="flex-1 border border-gray-300 rounded px-4 py-2.5 outline-none focus:border-blue-500"/>
                <button onclick="getFundInfo()" class="bg-blue-600 text-white px-5 py-2.5 rounded hover:bg-blue-700">
                    查询
                </button>
            </div>
        </div>

        <!-- 错误提示 -->
        <div id="errTip" class="hidden text-red-500 text-center mb-3"></div>

        <!-- 结果容器 -->
        <div id="wrap" class="hidden">
            <!-- 基础信息 -->
            <div class="card p-5 mb-4">
                <h2 class="title-line text-lg font-semibold mb-3" id="fundTitle"></h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
                    <div>基金代码：<span id="fCode" class="font-medium"></span></div>
                    <div>申购起点：<span id="buyMin"></span></div>
                    <div>定投起点：<span id="dtMin"></span></div>
                    <div>单日限购：<span id="dayLimit"></span></div>
                    <div>买入确认：<span id="tBuy"></span></div>
                    <div>卖出确认：<span id="tSell"></span></div>
                </div>
            </div>

            <!-- 申购费率 -->
            <div class="card p-5 mb-4">
                <h3 class="title-line font-semibold mb-3">申购费率（真实）</h3>
                <table>
                    <thead>
                        <tr><th>购买金额</th><th>原始费率</th><th>优惠费率</th></tr>
                    </thead>
                    <tbody id="buyRateBody"></tbody>
                </table>
            </div>

            <!-- 赎回费率 -->
            <div class="card p-5">
                <h3 class="title-line font-semibold mb-3">赎回费率（真实）</h3>
                <table>
                    <thead>
                        <tr><th>持有期限</th><th>赎回费率</th></tr>
                    </thead>
                    <tbody id="sellRateBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 国内直连、无需翻墙 公共CORS代理（多备用，失效自动切换）
        const proxyList = [
            "https://cors.isteed.cc/",
            "https://corsproxy.io/?",
            "https://api.codetabs.com/v1/proxy?url="
        ];
        let proxyIndex = 0;

        // 统一跨域请求
        async function corsFetch(url) {
            const p = proxyList[proxyIndex];
            const res = await fetch(p + encodeURIComponent(url));
            if(!res.ok) {
                proxyIndex = (proxyIndex + 1) % proxyList.length;
                throw new Error("代理切换重试");
            }
            return res;
        }

        // 入口：查询基金
        async function getFundInfo() {
            const kw = document.getElementById("kw").value.trim();
            if(!kw) return showErr("请输入基金代码或名称");
            showErr("");
            document.getElementById("wrap").classList.add("hidden");

            try {
                let fundCode = kw;
                // 非6位代码 → 先模糊搜索匹配基金
                if(!/^\d{6}$/.test(kw)) {
                    const searchUrl = `https://fundsuggest.eastmoney.com/api/suggest/get?input=${encodeURIComponent(kw)}&type=1`;
                    const res = await corsFetch(searchUrl);
                    const json = await res.json();
                    if(!json?.result?.datas?.length) throw new Error("未找到该基金");
                    fundCode = json.result.datas[0].code;
                }

                // 基金概况页（真实数据源）
                const detailUrl = `https://fund.eastmoney.com/f10/jbgk_${fundCode}.html`;
                const htmlRes = await corsFetch(detailUrl);
                const html = await htmlRes.text();

                // 1. 基金名称+代码
                const nameReg = /<div class="fundDetail-tit[\s\S]*?>([\s\S]*?)\((\d{6})\)/;
                const nameMatch = html.match(nameReg);
                const fundName = nameMatch ? nameMatch[1].trim() : "未知基金";
                const code = nameMatch ? nameMatch[2] : fundCode;

                // 2. 基础规则
                const buyMin = html.match(/申购起点[:：\s]*([\d\.]+元)/)?.[1] || "10元";
                const dtMin = html.match(/定投起点[:：\s]*([\d\.]+元)/)?.[1] || "10元";
                const dayLimit = html.match(/日累计申购限额[:：\s]*([^<]+)/)?.[1] || "无限制";
                const tBuy = html.match(/买入确认日[:：\s]*(T\+\d+)/)?.[1] || "T+1";
                const tSell = html.match(/卖出确认日[:：\s]*(T\+\d+)/)?.[1] || "T+1";

                // 3. 解析申购费率
                const buyRateHtml = html.match(/申购费率[\s\S]*?<table[\s\S]*?<\/table>/)?.[0] || "";
                const buyRows = buyRateHtml.matchAll(/<tr>[\s\S]*?<td>([^<]+)<\/td>[\s\S]*?<td>([^<]+)<\/td>/g);
                let buyHtml = "";
                for(let r of buyRows) {
                    buyHtml += `<tr><td>${r[1]}</td><td>${r[2]}</td><td>${(Number(r[2])*0.1).toFixed(2)}%</td></tr>`;
                }
                if(!buyHtml) buyHtml = `<tr><td colspan="3">暂无数据</td></tr>`;

                // 4. 解析赎回费率
                const sellRateHtml = html.match(/赎回费率[\s\S]*?<table[\s\S]*?<\/table>/)?.[0] || "";
                const sellRows = sellRateHtml.matchAll(/<tr>[\s\S]*?<td>([^<]+)<\/td>[\s\S]*?<td>([^<]+)<\/td>/g);
                let sellHtml = "";
                for(let r of sellRows) {
                    sellHtml += `<tr><td>${r[1]}</td><td>${r[2]}</td></tr>`;
                }
                if(!sellHtml) sellHtml = `<tr><td colspan="2">暂无数据</td></tr>`;

                // 渲染页面
                document.getElementById("fundTitle").innerText = fundName;
                document.getElementById("fCode").innerText = code;
                document.getElementById("buyMin").innerText = buyMin;
                document.getElementById("dtMin").innerText = dtMin;
                document.getElementById("dayLimit").innerText = dayLimit;
                document.getElementById("tBuy").innerText = tBuy;
                document.getElementById("tSell").innerText = tSell;
                document.getElementById("buyRateBody").innerHTML = buyHtml;
                document.getElementById("sellRateBody").innerHTML = sellHtml;

                document.getElementById("wrap").classList.remove("hidden");
            } catch (e) {
                console.error(e);
                showErr("查询失败：" + e.message + "，请稍后重试");
            }
        }

        function showErr(text) {
            const el = document.getElementById("errTip");
            if(text) {
                el.innerText = text;
                el.classList.remove("hidden");
            } else {
                el.classList.add("hidden");
            }
        }

        // 回车查询
        document.getElementById("kw").addEventListener("keydown",e=>{
            if(e.key==="Enter") getFundInfo();
        })
    </script>
</body>
</html>
