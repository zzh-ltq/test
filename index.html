<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金涨跌幅查询工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .search-input {
            width: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-btn {
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-btn:hover {
            background: #0056b3;
        }
        .data-section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #007bff;
            display: inline-block;
        }
        .fund-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .fund-table th, .fund-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .fund-table th {
            background-color: #f8f9fa;
            font-weight: bold;
            color: #333;
        }
        .fund-table tr:nth-child(even) {
            background-color: #fafafa;
        }
        /* 四分位排名样式 */
        .tbsi {
            display: inline-block;
            vertical-align: middle;
            margin-right: 5px;
        }
        .tbsi td {
            width: 8px;
            height: 8px;
            border: 1px solid #ccc;
        }
        .tbsi .tdblack {
            background: #333;
        }
        .tbsi .tdno {
            background: #fff;
        }
        .sifen {
            display: inline-block;
            margin: 0;
            vertical-align: middle;
        }
        /* 提示气泡样式 */
        .infoTips {
            position: relative;
            cursor: pointer;
            color: #007bff;
        }
        .tipsBubble {
            position: absolute;
            left: 0;
            top: 25px;
            z-index: 999;
            width: 400px;
            padding: 8px;
            background: #fff;
            border: 1px solid #ccc;
            font-size: 12px;
            line-height: 1.5;
            display: none;
            text-align: left;
        }
        .infoTips:hover .tipsBubble {
            display: block;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">基金涨跌幅查询工具</div>
        
        <div class="search-box">
            <input type="text" class="search-input" id="fundCode" placeholder="请输入基金代码/名称">
            <button class="search-btn" onclick="searchFund()">查询</button>
        </div>

        <!-- 季度涨幅数据区域 -->
        <div class="data-section" id="quarterSection">
            <div class="section-title">季度涨幅</div>
            <div id="quarterData"></div>
        </div>

        <!-- 年度涨幅数据区域 -->
        <div class="data-section" id="yearSection">
            <div class="section-title">年度涨幅</div>
            <div id="yearData"></div>
        </div>
    </div>

    <script>
        // ===================== 核心优化：完整解析季度+年度所有数据 =====================
        // 解析基金表格数据（兼容：涨幅、沪深300、同类平均、同类排名、四分位排名）
        function parseFundTable(htmlContent) {
            if (!htmlContent) return '<div class="empty-tip">暂无数据</div>';
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            const rows = tempDiv.querySelectorAll('tr');
            if (!rows.length) return '<div class="empty-tip">暂无数据</div>';

            let tableHtml = '<table class="fund-table">';
            rows.forEach(row => {
                tableHtml += '<tr>';
                const cells = row.querySelectorAll('td, th');
                cells.forEach(cell => {
                    const tag = cell.tagName.toLowerCase();
                    tableHtml += `<${tag}>${cell.innerHTML}</${tag}>`;
                });
                tableHtml += '</tr>';
            });
            tableHtml += '</table>';
            return tableHtml;
        }

        // 渲染季度涨幅数据（完整显示所有字段）
        function renderQuarterData() {
            const container = document.getElementById('quarterData');
            // 调用后台季度数据：qapidata 为接口返回的原始数据
            if (window.qapidata && window.qapidata.content) {
                container.innerHTML = parseFundTable(window.qapidata.content);
            } else {
                container.innerHTML = '<div class="empty-tip">未查询到季度涨幅数据</div>';
            }
        }

        // 渲染年度涨幅数据（完整显示所有字段）
        function renderYearData() {
            const container = document.getElementById('yearData');
            // 调用后台年度数据：yapidata 为接口返回的原始数据
            if (window.yapidata && window.yapidata.content) {
                container.innerHTML = parseFundTable(window.yapidata.content);
            } else {
                container.innerHTML = '<div class="empty-tip">未查询到年度涨幅数据</div>';
            }
        }

        // 基金查询按钮事件
        function searchFund() {
            const fundCode = document.getElementById('fundCode').value.trim();
            if (!fundCode) {
                alert('请输入基金代码或名称');
                return;
            }
            
            // 模拟查询后加载数据（实际项目中替换为你的接口请求）
            console.log('查询基金：', fundCode);
            
            // 渲染完整数据
            renderQuarterData();
            renderYearData();
        }

        // 页面初始化自动加载数据
        window.onload = function() {
            renderQuarterData();
            renderYearData();
        };
    </script>
</body>
</html>
