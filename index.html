<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>基金数据查询 - 官方接口版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            color: #1f2d3d;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 搜索卡片 */
        .search-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px 28px;
            margin-bottom: 28px;
        }

        .search-box {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
        }

        .input-group {
            flex: 2;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #5a6874;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #dcdfe6;
            border-radius: 14px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #e6352c;
            box-shadow: 0 0 0 3px rgba(230,53,44,0.1);
        }

        .btn-query {
            background: #e6352c;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-query:hover {
            background: #c42820;
            transform: translateY(-1px);
        }

        /* 基金信息卡片 */
        .info-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .fund-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e2a3a;
        }

        .fund-code {
            font-size: 1rem;
            color: #7e8c8f;
            margin-left: 12px;
        }

        .fund-scale {
            background: #fef2e9;
            padding: 8px 20px;
            border-radius: 40px;
            color: #e67e22;
            font-weight: 600;
        }

        .fund-scale span {
            font-size: 1.3rem;
            font-weight: 800;
            margin-right: 4px;
        }

        /* 表格卡片 */
        .section-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 28px;
            overflow-x: auto;
            padding: 8px 0;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            padding: 18px 24px 8px 24px;
            color: #1f2d3d;
            border-left: 5px solid #e6352c;
        }

        .fund-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 680px;
        }

        .fund-table th {
            background: #f8fafc;
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            color: #4a5b6e;
            border-bottom: 1px solid #e9edf2;
        }

        .fund-table td {
            padding: 12px 12px;
            text-align: center;
            border-bottom: 1px solid #f0f2f5;
            color: #2c3e50;
        }

        .positive {
            color: #e6352c;
            font-weight: 500;
        }

        .negative {
            color: #2d9c6b;
            font-weight: 500;
        }

        .neutral {
            color: #7f8c8d;
        }

        .loading-text {
            text-align: center;
            padding: 48px;
            color: #8a9cb0;
        }

        .error-msg {
            background: #fee9e6;
            color: #c0392b;
            border-radius: 16px;
            padding: 14px 20px;
            margin: 16px 24px;
            text-align: center;
        }

        .footnote {
            text-align: right;
            font-size: 12px;
            color: #95a5a6;
            padding: 12px 24px 20px;
            border-top: 1px solid #edf2f7;
            margin-top: 8px;
        }

        @media (max-width: 700px) {
            .fund-name {
                font-size: 1.2rem;
            }
            .section-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-card">
        <div class="search-box">
            <div class="input-group">
                <label>🐔 基金代码 (例如: 000001, 110011, 005827)</label>
                <input type="text" id="fundCodeInput" placeholder="输入6位基金代码" value="004685" maxlength="6">
            </div>
            <button class="btn-query" id="searchBtn">🔍 查询基金</button>
        </div>
        <div class="footnote" style="border:none; padding:12px 0 0 0;">数据源：天天基金官方接口（fundf10.eastmoney.com）</div>
    </div>

    <div id="fundInfoArea" class="info-card" style="display: none;"></div>
    <div id="phaseReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📈 阶段涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table" id="phaseTable">
                <thead>
                <tr>
                    <th>期间</th><th>阶段涨幅</th><th>同类平均</th><th>沪深300</th><th>同类排名</th><th>四分位排名</th>
                </tr>
                </thead>
                <tbody id="phaseBody">
                <tr><td colspan="6" class="loading-text">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="quarterReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📆 季度涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table" id="quarterTable">
                <thead>
                <tr><th>季度</th><th>阶段涨幅</th><th>同类平均</th><th>沪深300</th><th>同类排名</th><th>四分位排名</th></tr>
                </thead>
                <tbody id="quarterBody">
                <tr><td colspan="6" class="loading-text">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="yearReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📅 年度涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table" id="yearTable">
                <thead>
                <tr><th>年度</th><th>阶段涨幅</th><th>同类平均</th><th>沪深300</th><th>同类排名</th><th>四分位排名</th></tr>
                </thead>
                <tbody id="yearBody">
                <tr><td colspan="6" class="loading-text">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ==================== 工具函数 ====================
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatPercent(value) {
        if (value === undefined || value === null || value === '') return '<span class="neutral">--</span>';
        let num = parseFloat(value);
        if (isNaN(num)) return '<span class="neutral">' + escapeHtml(String(value)) + '</span>';
        const formatted = num.toFixed(2);
        if (num > 0) return '<span class="positive">+' + formatted + '%</span>';
        if (num < 0) return '<span class="negative">' + formatted + '%</span>';
        return '<span class="neutral">' + formatted + '%</span>';
    }

    // 四分位排名映射为中文
    function getRankText(rank) {
        const map = { '优秀': '优秀', '良好': '良好', '一般': '一般', '不佳': '不佳' };
        return map[rank] || rank || '--';
    }

    // ==================== 核心数据加载（通过 script 标签动态加载，绕过跨域）====================
    function loadScript(url, globalVarName) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const backup = window[globalVarName];
            delete window[globalVarName];
            const timeout = setTimeout(() => {
                script.remove();
                reject(new Error('请求超时'));
            }, 10000);
            script.onload = () => {
                clearTimeout(timeout);
                const data = window[globalVarName];
                if (backup !== undefined) window[globalVarName] = backup;
                else delete window[globalVarName];
                script.remove();
                if (data) resolve(data);
                else reject(new Error('数据加载失败'));
            };
            script.onerror = () => {
                clearTimeout(timeout);
                script.remove();
                reject(new Error('网络错误'));
            };
            script.src = url;
            document.head.appendChild(script);
        });
    }

    // 解析阶段涨幅数据（jdzf 接口）
    function parsePhaseData(raw) {
        const content = raw.content || '';
        const lines = content.split('-');
        const periods = ['今年来', '近1周', '近1月', '近3月', '近6月', '近1年', '近2年', '近3年', '近5年', '成立来'];
        const result = [];
        let idx = 0;
        for (let line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;
            if (idx >= periods.length) break;
            const period = periods[idx];
            // 格式示例: " 今年来 - 2.55% - 7.00% - 2.13% - 1419|2330 - 151↓ 一般"
            const parts = trimmed.split('-').map(p => p.trim());
            if (parts.length >= 5) {
                const fundRet = parts[0] === period ? parts[1] : parts[0];
                const avgRet = parts[1] || '';
                const hs300Ret = parts[2] || '';
                const rank = parts[3] || '';
                let rankText = parts[4] || '';
                // 处理排名变动和四分位
                let rankChange = '';
                let quartile = '';
                if (rankText) {
                    const match = rankText.match(/(\d+)\s*(↓|↑)?\s*(.*)/);
                    if (match) {
                        rankChange = match[2] || '';
                        quartile = match[3] || '';
                    } else {
                        quartile = rankText;
                    }
                }
                result.push({
                    period: period,
                    fundReturn: fundRet,
                    avgReturn: avgRet,
                    hs300Return: hs300Ret,
                    rank: rank,
                    rankChange: rankChange,
                    quartile: quartile
                });
            }
            idx++;
        }
        return result;
    }

    // 解析季度涨幅数据（quarterzf 接口）
    function parseQuarterData(raw) {
        const content = raw.content || '';
        // 提取季度列表
        const quarterMatch = content.match(/(\d{2}年\d季度|\d{4}年\d季度)(?:\s*\|\s*(\d{2}年\d季度|\d{4}年\d季度))*\|?\s*阶段涨幅/);
        let quarters = [];
        if (quarterMatch) {
            const qStr = quarterMatch[0].replace('阶段涨幅', '').trim();
            quarters = qStr.split('|').map(q => q.trim());
        }
        // 提取数据行
        const lines = content.split('\n');
        let fundReturns = [], avgReturns = [], hs300Returns = [], ranks = [], quartiles = [];
        for (let line of lines) {
            if (line.includes('阶段涨幅')) {
                const match = line.match(/阶段涨幅\s*\|\s*(.*)/);
                if (match) fundReturns = match[1].split('|').map(v => v.trim());
            } else if (line.includes('同类平均')) {
                const match = line.match(/同类平均.*?\|\s*(.*)/);
                if (match) avgReturns = match[1].split('|').map(v => v.trim());
            } else if (line.includes('沪深300')) {
                const match = line.match(/沪深300\s*\|\s*(.*)/);
                if (match) hs300Returns = match[1].split('|').map(v => v.trim());
            } else if (line.includes('同类排名')) {
                const match = line.match(/同类排名.*?\|\s*(.*)/);
                if (match) ranks = match[1].split('|').map(v => v.trim());
            } else if (line.includes('四分位排名')) {
                const match = line.match(/四分位排名.*?\|\s*(.*)/);
                if (match) quartiles = match[1].split(/\s+/);
            }
        }
        const result = [];
        const len = Math.max(quarters.length, fundReturns.length, avgReturns.length, hs300Returns.length, ranks.length, quartiles.length);
        for (let i = 0; i < len; i++) {
            result.push({
                period: quarters[i] || '--',
                fundReturn: fundReturns[i] || '',
                avgReturn: avgReturns[i] || '',
                hs300Return: hs300Returns[i] || '',
                rank: ranks[i] || '',
                quartile: quartiles[i] || ''
            });
        }
        return result;
    }

    // 解析年度涨幅数据（yearzf 接口）
    function parseYearData(raw) {
        const content = raw.content || '';
        const lines = content.split('\n');
        let years = [], fundReturns = [], avgReturns = [], hs300Returns = [], ranks = [], quartiles = [];
        for (let line of lines) {
            if (line.includes('年度') && line.includes('|')) {
                const match = line.match(/(\d{4}年度)(?:\s*\|\s*(\d{4}年度))*\|?\s*阶段涨幅/);
                if (match) {
                    const yStr = match[0].replace('阶段涨幅', '').trim();
                    years = yStr.split('|').map(y => y.replace('年度', '').trim());
                }
            } else if (line.includes('阶段涨幅')) {
                const match = line.match(/阶段涨幅\s*\|\s*(.*)/);
                if (match) fundReturns = match[1].split('|').map(v => v.trim());
            } else if (line.includes('同类平均')) {
                const match = line.match(/同类平均.*?\|\s*(.*)/);
                if (match) avgReturns = match[1].split('|').map(v => v.trim());
            } else if (line.includes('沪深300')) {
                const match = line.match(/沪深300\s*\|\s*(.*)/);
                if (match) hs300Returns = match[1].split('|').map(v => v.trim());
            } else if (line.includes('同类排名')) {
                const match = line.match(/同类排名.*?\|\s*(.*)/);
                if (match) ranks = match[1].split('|').map(v => v.trim());
            } else if (line.includes('四分位排名')) {
                const match = line.match(/四分位排名.*?\|\s*(.*)/);
                if (match) quartiles = match[1].split(/\s+/);
            }
        }
        const result = [];
        const len = Math.max(years.length, fundReturns.length, avgReturns.length, hs300Returns.length, ranks.length, quartiles.length);
        for (let i = 0; i < len; i++) {
            result.push({
                period: years[i] || '--',
                fundReturn: fundReturns[i] || '',
                avgReturn: avgReturns[i] || '',
                hs300Return: hs300Returns[i] || '',
                rank: ranks[i] || '',
                quartile: quartiles[i] || ''
            });
        }
        return result;
    }

    // 获取基金名称和规模（从 pingzhongdata 获取）
    function fetchFundBaseInfo(code) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const url = `https://fund.eastmoney.com/pingzhongdata/${code}.js`;
            const timeout = setTimeout(() => {
                script.remove();
                reject(new Error('基础信息加载超时'));
            }, 10000);
            script.onload = () => {
                clearTimeout(timeout);
                try {
                    const name = window.fS_name || '未知基金';
                    let scale = null;
                    if (window.Data_fluctuationScale && window.Data_fluctuationScale.series && window.Data_fluctuationScale.series.length) {
                        const last = window.Data_fluctuationScale.series[window.Data_fluctuationScale.series.length - 1];
                        scale = last.y;
                    }
                    delete window.fS_name;
                    delete window.Data_fluctuationScale;
                    script.remove();
                    resolve({ name, scale });
                } catch (e) {
                    reject(e);
                }
            };
            script.onerror = () => {
                clearTimeout(timeout);
                script.remove();
                reject(new Error('基金基础数据加载失败'));
            };
            script.src = url;
            document.head.appendChild(script);
        });
    }

    // ==================== 渲染函数 ====================
    function renderFundInfo(name, scale, code) {
        const area = document.getElementById('fundInfoArea');
        let scaleText = '暂无规模数据';
        if (scale !== undefined && scale !== null) {
            let num = parseFloat(scale);
            if (!isNaN(num)) scaleText = num.toFixed(2) + ' 亿元';
            else scaleText = String(scale);
        }
        area.innerHTML = '<div style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:12px;">' +
            '<div><span class="fund-name">' + escapeHtml(name) + '</span><span class="fund-code">(' + escapeHtml(code) + ')</span></div>' +
            '<div class="fund-scale">📊 最新规模 <span>' + escapeHtml(scaleText) + '</span></div>' +
            '</div>';
        area.style.display = 'flex';
    }

    function renderTable(containerId, data) {
        const tbody = document.querySelector('#' + containerId + ' tbody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="neutral">暂无数据</td></tr>';
            return;
        }
        let html = '';
        for (let item of data) {
            html += '<tr>' +
                '<td style="font-weight:500;">' + escapeHtml(item.period) + '</td>' +
                '<td>' + formatPercent(item.fundReturn) + '</td>' +
                '<td>' + formatPercent(item.avgReturn) + '</td>' +
                '<td>' + formatPercent(item.hs300Return) + '</td>' +
                '<td>' + escapeHtml(item.rank || '--') + '</td>' +
                '<td>' + escapeHtml(getRankText(item.quartile)) + '</td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    }

    function showLoadingState() {
        document.getElementById('fundInfoArea').style.display = 'none';
        document.getElementById('phaseReturnArea').style.display = 'block';
        document.getElementById('quarterReturnArea').style.display = 'block';
        document.getElementById('yearReturnArea').style.display = 'block';
        document.getElementById('phaseBody').innerHTML = '<tr><td colspan="6" class="loading-text">⏳ 加载阶段涨幅中...</td></tr>';
        document.getElementById('quarterBody').innerHTML = '<tr><td colspan="6" class="loading-text">⏳ 加载季度涨幅中...</td></tr>';
        document.getElementById('yearBody').innerHTML = '<tr><td colspan="6" class="loading-text">⏳ 加载年度涨幅中...</td></tr>';
        const oldErrs = document.querySelectorAll('.error-msg');
        oldErrs.forEach(el => el.remove());
    }

    function showGlobalError(msg) {
        const phaseArea = document.getElementById('phaseReturnArea');
        const oldErrs = document.querySelectorAll('.error-msg');
        oldErrs.forEach(el => el.remove());
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.innerHTML = '❌ 查询失败: ' + escapeHtml(msg) + '<br>请核对基金代码或稍后再试';
        phaseArea.insertAdjacentElement('afterbegin', errDiv);
        document.getElementById('phaseBody').innerHTML = '<tr><td colspan="6" class="neutral">' + escapeHtml(msg) + '</td></tr>';
        document.getElementById('quarterBody').innerHTML = '<tr><td colspan="6" class="neutral">无法获取季度数据</td></tr>';
        document.getElementById('yearBody').innerHTML = '<tr><td colspan="6" class="neutral">无法获取年度数据</td></tr>';
        document.getElementById('fundInfoArea').style.display = 'none';
    }

    // ==================== 主查询函数 ====================
    async function queryFund(code) {
        if (!/^\d{6}$/.test(code)) {
            showGlobalError('基金代码必须是6位数字');
            return;
        }
        showLoadingState();

        const baseUrl = 'https://fundf10.eastmoney.com/FundArchivesDatas.aspx';
        const urls = {
            phase: baseUrl + '?type=jdzf&code=' + code,
            quarter: baseUrl + '?type=quarterzf&code=' + code,
            year: baseUrl + '?type=yearzf&code=' + code
        };

        let phaseData = null, quarterData = null, yearData = null, fundInfo = null;
        let errors = [];

        try {
            fundInfo = await fetchFundBaseInfo(code);
        } catch (e) {
            errors.push('基础信息: ' + e.message);
        }

        try {
            const rawPhase = await loadScript(urls.phase, 'apidata');
            phaseData = parsePhaseData(rawPhase);
        } catch (e) {
            errors.push('阶段涨幅: ' + e.message);
        }

        try {
            const rawQuarter = await loadScript(urls.quarter, 'qapidata');
            quarterData = parseQuarterData(rawQuarter);
        } catch (e) {
            errors.push('季度涨幅: ' + e.message);
        }

        try {
            const rawYear = await loadScript(urls.year, 'yapidata');
            yearData = parseYearData(rawYear);
        } catch (e) {
            errors.push('年度涨幅: ' + e.message);
        }

        if (!phaseData && !quarterData.length && !yearData.length && !fundInfo) {
            showGlobalError('基金 ' + code + ' 数据拉取失败，可能代码不存在。' + errors.join('; '));
            return;
        }

        if (errors.length > 0 && (fundInfo || phaseData || quarterData.length || yearData.length)) {
            const warnMsg = '部分数据加载失败: ' + errors.join('; ');
            const toast = document.createElement('div');
            toast.className = 'error-msg';
            toast.style.background = '#fff3e0';
            toast.style.color = '#e67e22';
            toast.innerText = '⚠️ ' + warnMsg;
            const phaseContainer = document.getElementById('phaseReturnArea');
            const oldToast = phaseContainer.querySelector('.toast-warning');
            if (oldToast) oldToast.remove();
            toast.classList.add('toast-warning');
            phaseContainer.insertAdjacentElement('afterbegin', toast);
            setTimeout(() => toast.remove(), 6000);
        }

        if (fundInfo) renderFundInfo(fundInfo.name, fundInfo.scale, code);
        if (phaseData && phaseData.length) renderTable('phaseTable', phaseData);
        else document.getElementById('phaseBody').innerHTML = '<tr><td colspan="6" class="neutral">阶段涨幅数据暂不可用</td></tr>';

        if (quarterData && quarterData.length) renderTable('quarterTable', quarterData);
        else document.getElementById('quarterBody').innerHTML = '<tr><td colspan="6" class="neutral">暂无季度涨幅数据</td></tr>';

        if (yearData && yearData.length) renderTable('yearTable', yearData);
        else document.getElementById('yearBody').innerHTML = '<tr><td colspan="6" class="neutral">暂无年度涨幅数据</td></tr>';
    }

    // ==================== 页面初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
        const searchBtn = document.getElementById('searchBtn');
        const inputEl = document.getElementById('fundCodeInput');
        const perform = () => queryFund(inputEl.value.trim());
        searchBtn.addEventListener('click', perform);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') perform();
        });
        queryFund('004685');
    });
</script>
</body>
</html>
