<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>基金数据查询 - 天天基金官方版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            color: #1f2d3d;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 搜索卡片 */
        .search-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px 28px;
            margin-bottom: 28px;
        }

        .search-box {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
        }

        .input-group {
            flex: 2;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #5a6874;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #dcdfe6;
            border-radius: 14px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #e6352c;
            box-shadow: 0 0 0 3px rgba(230,53,44,0.1);
        }

        .btn-query {
            background: #e6352c;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-query:hover {
            background: #c42820;
            transform: translateY(-1px);
        }

        /* 基金信息卡片 */
        .info-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .fund-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e2a3a;
        }

        .fund-code {
            font-size: 1rem;
            color: #7e8c8f;
            margin-left: 12px;
        }

        .fund-scale {
            background: #fef2e9;
            padding: 8px 20px;
            border-radius: 40px;
            color: #e67e22;
            font-weight: 600;
        }

        .fund-scale span {
            font-size: 1.3rem;
            font-weight: 800;
            margin-right: 4px;
        }

        /* 表格卡片 */
        .section-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 28px;
            overflow-x: auto;
            padding: 8px 0;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            padding: 18px 24px 8px 24px;
            color: #1f2d3d;
            border-left: 5px solid #e6352c;
        }

        .fund-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 800px;
        }

        .fund-table th {
            background: #f8fafc;
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            color: #4a5b6e;
            border-bottom: 1px solid #e9edf2;
        }

        .fund-table td {
            padding: 12px 12px;
            text-align: center;
            border-bottom: 1px solid #f0f2f5;
            color: #2c3e50;
        }

        .positive {
            color: #e6352c;
            font-weight: 500;
        }

        .negative {
            color: #2d9c6b;
            font-weight: 500;
        }

        .neutral {
            color: #7f8c8d;
        }

        .loading-text {
            text-align: center;
            padding: 48px;
            color: #8a9cb0;
        }

        .error-msg {
            background: #fee9e6;
            color: #c0392b;
            border-radius: 16px;
            padding: 14px 20px;
            margin: 16px 24px;
            text-align: center;
        }

        .footnote {
            text-align: right;
            font-size: 12px;
            color: #95a5a6;
            padding: 12px 24px 20px;
            border-top: 1px solid #edf2f7;
            margin-top: 8px;
        }

        @media (max-width: 700px) {
            .fund-name {
                font-size: 1.2rem;
            }
            .section-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-card">
        <div class="search-box">
            <div class="input-group">
                <label>🐔 基金代码 (例如: 000001, 110011, 005827)</label>
                <input type="text" id="fundCodeInput" placeholder="输入6位基金代码" value="004685" maxlength="6">
            </div>
            <button class="btn-query" id="searchBtn">🔍 查询基金</button>
        </div>
        <div class="footnote" style="border:none; padding:12px 0 0 0;">数据源：天天基金官方接口（fundf10.eastmoney.com）</div>
    </div>

    <div id="fundInfoArea" class="info-card" style="display: none;"></div>
    <div id="phaseReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📈 阶段涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table" id="phaseTable">
                <thead>
                    <tr><th>期间</th><th>阶段涨幅</th><th>同类平均</th><th>沪深300</th><th>同类排名</th><th>四分位排名</th></tr>
                </thead>
                <tbody id="phaseBody"><tr><td colspan="6" class="loading-text">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
    <div id="quarterReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📆 季度涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table" id="quarterTable">
                <thead><tr><th>季度</th><th>阶段涨幅</th><th>同类平均</th><th>沪深300</th><th>同类排名</th><th>四分位排名</th></tr></thead>
                <tbody id="quarterBody"><tr><td colspan="6" class="loading-text">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
    <div id="yearReturnArea" class="section-card" style="display: none;">
        <div class="section-title">📅 年度涨幅 (%)</div>
        <div style="overflow-x: auto;">
            <table class="fund-table" id="yearTable">
                <thead><tr><th>年度</th><th>阶段涨幅</th><th>同类平均</th><th>沪深300</th><th>同类排名</th><th>四分位排名</th></tr></thead>
                <tbody id="yearBody"><tr><td colspan="6" class="loading-text">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ==================== 工具函数 ====================
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatPercent(value) {
        if (value === undefined || value === null || value === '') return '<span class="neutral">--</span>';
        let num = parseFloat(value);
        if (isNaN(num)) return '<span class="neutral">' + escapeHtml(String(value)) + '</span>';
        const formatted = num.toFixed(2);
        if (num > 0) return '<span class="positive">+' + formatted + '%</span>';
        if (num < 0) return '<span class="negative">' + formatted + '%</span>';
        return '<span class="neutral">' + formatted + '%</span>';
    }

    // 通过 script 标签加载 JSONP 风格数据，绕过跨域
    function loadScript(url, varName) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const old = window[varName];
            delete window[varName];
            const timeout = setTimeout(() => {
                script.remove();
                reject(new Error('请求超时'));
            }, 10000);
            script.onload = () => {
                clearTimeout(timeout);
                const data = window[varName];
                if (old !== undefined) window[varName] = old;
                else delete window[varName];
                script.remove();
                if (data) resolve(data);
                else reject(new Error('数据为空'));
            };
            script.onerror = () => {
                clearTimeout(timeout);
                script.remove();
                reject(new Error('网络错误'));
            };
            script.src = url;
            document.head.appendChild(script);
        });
    }

    // ==================== 数据解析 ====================
    // 阶段涨幅接口返回的是 <ul> 列表结构，每个 ul 代表一个时间段
    function parsePhaseData(apidata) {
        const content = apidata.content || '';
        const div = document.createElement('div');
        div.innerHTML = content;
        const items = [];
        const uls = div.querySelectorAll('ul');
        for (let ul of uls) {
            const titleEl = ul.querySelector('.title');
            if (!titleEl) continue;
            const period = titleEl.innerText.trim();
            if (period === '') continue;
            // 提取涨幅、同类平均、沪深300
            const torList = ul.querySelectorAll('.tor');
            let fundRet = '', avgRet = '', hs300Ret = '';
            if (torList.length >= 3) {
                fundRet = torList[0].innerText.trim();
                avgRet = torList[1].innerText.trim();
                hs300Ret = torList[2].innerText.trim();
            }
            // 提取排名
            const tlpmEl = ul.querySelector('.tlpm');
            let rank = tlpmEl ? tlpmEl.innerText.trim() : '';
            // 提取四分位排名
            const sifenEl = ul.querySelector('.sifen');
            let quartile = sifenEl ? sifenEl.innerText.trim() : '';
            items.push({ period, fundRet, avgRet, hs300Ret, rank, quartile });
        }
        // 按照官网顺序排列
        const order = ['今年来', '近1周', '近1月', '近3月', '近6月', '近1年', '近2年', '近3年', '近5年', '成立来'];
        const ordered = [];
        for (let p of order) {
            const found = items.find(i => i.period === p);
            if (found) ordered.push(found);
        }
        return ordered;
    }

    // 季度涨幅接口返回的是 <table> 结构
    function parseQuarterData(qapidata) {
        const content = qapidata.content || '';
        const div = document.createElement('div');
        div.innerHTML = content;
        const table = div.querySelector('table');
        if (!table) return [];
        const thead = table.querySelector('thead');
        const tbody = table.querySelector('tbody');
        if (!thead || !tbody) return [];
        // 获取季度列名（第一个 th 是空，跳过）
        const ths = thead.querySelectorAll('th');
        const quarters = [];
        for (let i = 1; i < ths.length; i++) {
            quarters.push(ths[i].innerText.trim());
        }
        // 获取各行数据
        const rows = tbody.querySelectorAll('tr');
        let fundReturns = [], avgReturns = [], hs300Returns = [], ranks = [], quartiles = [];
        for (let row of rows) {
            const firstTd = row.querySelector('td.tdgray');
            if (!firstTd) continue;
            const label = firstTd.innerText.trim();
            const tds = row.querySelectorAll('td:not(.tdgray)');
            const values = Array.from(tds).map(td => td.innerText.trim());
            if (label === '阶段涨幅') fundReturns = values;
            else if (label === '同类平均') avgReturns = values;
            else if (label === '沪深300') hs300Returns = values;
            else if (label === '同类排名') ranks = values;
            else if (label === '四分位排名') quartiles = values;
        }
        const result = [];
        for (let i = 0; i < quarters.length; i++) {
            result.push({
                period: quarters[i],
                fundRet: fundReturns[i] || '',
                avgRet: avgReturns[i] || '',
                hs300Ret: hs300Returns[i] || '',
                rank: ranks[i] || '',
                quartile: quartiles[i] || ''
            });
        }
        return result;
    }

    // 年度涨幅接口结构同季度涨幅，只是年份列名
    function parseYearData(yapidata) {
        const content = yapidata.content || '';
        const div = document.createElement('div');
        div.innerHTML = content;
        const table = div.querySelector('table');
        if (!table) return [];
        const thead = table.querySelector('thead');
        const tbody = table.querySelector('tbody');
        if (!thead || !tbody) return [];
        const ths = thead.querySelectorAll('th');
        const years = [];
        for (let i = 1; i < ths.length; i++) {
            let yearText = ths[i].innerText.trim();
            yearText = yearText.replace('年度', '');
            years.push(yearText);
        }
        const rows = tbody.querySelectorAll('tr');
        let fundReturns = [], avgReturns = [], hs300Returns = [], ranks = [], quartiles = [];
        for (let row of rows) {
            const firstTd = row.querySelector('td.tdgray');
            if (!firstTd) continue;
            const label = firstTd.innerText.trim();
            const tds = row.querySelectorAll('td:not(.tdgray)');
            const values = Array.from(tds).map(td => td.innerText.trim());
            if (label === '阶段涨幅') fundReturns = values;
            else if (label === '同类平均') avgReturns = values;
            else if (label === '沪深300') hs300Returns = values;
            else if (label === '同类排名') ranks = values;
            else if (label === '四分位排名') quartiles = values;
        }
        const result = [];
        for (let i = 0; i < years.length; i++) {
            result.push({
                period: years[i],
                fundRet: fundReturns[i] || '',
                avgRet: avgReturns[i] || '',
                hs300Ret: hs300Returns[i] || '',
                rank: ranks[i] || '',
                quartile: quartiles[i] || ''
            });
        }
        return result;
    }

    // 获取基金名称和规模（使用 pingzhongdata，该接口稳定无跨域）
    function fetchFundBaseInfo(code) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const url = `https://fund.eastmoney.com/pingzhongdata/${code}.js`;
            const timeout = setTimeout(() => {
                script.remove();
                reject(new Error('基础信息加载超时'));
            }, 10000);
            script.onload = () => {
                clearTimeout(timeout);
                try {
                    const name = window.fS_name || '未知基金';
                    let scale = null;
                    if (window.Data_fluctuationScale && window.Data_fluctuationScale.series && window.Data_fluctuationScale.series.length) {
                        const last = window.Data_fluctuationScale.series[window.Data_fluctuationScale.series.length - 1];
                        scale = last.y;
                    }
                    // 清理全局变量
                    delete window.fS_name;
                    delete window.Data_fluctuationScale;
                    script.remove();
                    resolve({ name, scale });
                } catch (e) {
                    reject(e);
                }
            };
            script.onerror = () => {
                clearTimeout(timeout);
                script.remove();
                reject(new Error('基金基础数据加载失败'));
            };
            script.src = url;
            document.head.appendChild(script);
        });
    }

    // ==================== 渲染表格 ====================
    function renderTable(tbodyId, data) {
        const tbody = document.getElementById(tbodyId);
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="neutral">暂无数据</td></tr>';
            return;
        }
        let html = '';
        for (let item of data) {
            html += `<tr>
                <td style="font-weight:500;">${escapeHtml(item.period)}</td>
                <td>${formatPercent(item.fundRet)}</td>
                <td>${formatPercent(item.avgRet)}</td>
                <td>${formatPercent(item.hs300Ret)}</td>
                <td>${escapeHtml(item.rank)}</td>
                <td>${escapeHtml(item.quartile)}</td>
            </tr>`;
        }
        tbody.innerHTML = html;
    }

    function showLoadingState() {
        document.getElementById('fundInfoArea').style.display = 'none';
        document.getElementById('phaseReturnArea').style.display = 'block';
        document.getElementById('quarterReturnArea').style.display = 'block';
        document.getElementById('yearReturnArea').style.display = 'block';
        document.getElementById('phaseBody').innerHTML = '<tr><td colspan="6" class="loading-text">⏳ 加载阶段涨幅中...</td></tr>';
        document.getElementById('quarterBody').innerHTML = '<tr><td colspan="6" class="loading-text">⏳ 加载季度涨幅中...</td></tr>';
        document.getElementById('yearBody').innerHTML = '<tr><td colspan="6" class="loading-text">⏳ 加载年度涨幅中...</td></tr>';
        document.querySelectorAll('.error-msg').forEach(el => el.remove());
    }

    function showGlobalError(msg) {
        const phaseArea = document.getElementById('phaseReturnArea');
        document.querySelectorAll('.error-msg').forEach(el => el.remove());
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.innerHTML = '❌ 查询失败: ' + escapeHtml(msg) + '<br>请核对基金代码或稍后再试';
        phaseArea.insertAdjacentElement('afterbegin', errDiv);
        document.getElementById('phaseBody').innerHTML = '<tr><td colspan="6" class="neutral">' + escapeHtml(msg) + '</td></tr>';
        document.getElementById('quarterBody').innerHTML = '<tr><td colspan="6" class="neutral">无法获取季度数据</td></tr>';
        document.getElementById('yearBody').innerHTML = '<tr><td colspan="6" class="neutral">无法获取年度数据</td></tr>';
        document.getElementById('fundInfoArea').style.display = 'none';
    }

    // ==================== 主查询 ====================
    async function queryFund(code) {
        if (!/^\d{6}$/.test(code)) {
            showGlobalError('基金代码必须是6位数字');
            return;
        }
        showLoadingState();

        const baseUrl = 'https://fundf10.eastmoney.com/FundArchivesDatas.aspx';
        const urls = {
            phase: `${baseUrl}?type=jdzf&code=${code}`,
            quarter: `${baseUrl}?type=quarterzf&code=${code}`,
            year: `${baseUrl}?type=yearzf&code=${code}`
        };

        let phaseData = [], quarterData = [], yearData = [], fundInfo = null;
        let errors = [];

        try {
            fundInfo = await fetchFundBaseInfo(code);
        } catch (e) {
            errors.push('基础信息: ' + e.message);
        }

        try {
            const raw = await loadScript(urls.phase, 'apidata');
            phaseData = parsePhaseData(raw);
        } catch (e) {
            errors.push('阶段涨幅: ' + e.message);
        }

        try {
            const raw = await loadScript(urls.quarter, 'qapidata');
            quarterData = parseQuarterData(raw);
        } catch (e) {
            errors.push('季度涨幅: ' + e.message);
        }

        try {
            const raw = await loadScript(urls.year, 'yapidata');
            yearData = parseYearData(raw);
        } catch (e) {
            errors.push('年度涨幅: ' + e.message);
        }

        if (!phaseData.length && !quarterData.length && !yearData.length && !fundInfo) {
            showGlobalError(`基金 ${code} 数据拉取失败，可能代码不存在。${errors.join('; ')}`);
            return;
        }

        if (errors.length > 0 && (fundInfo || phaseData.length || quarterData.length || yearData.length)) {
            const warnMsg = '部分数据加载失败: ' + errors.join('; ');
            const toast = document.createElement('div');
            toast.className = 'error-msg';
            toast.style.background = '#fff3e0';
            toast.style.color = '#e67e22';
            toast.innerText = '⚠️ ' + warnMsg;
            const phaseContainer = document.getElementById('phaseReturnArea');
            const oldToast = phaseContainer.querySelector('.toast-warning');
            if (oldToast) oldToast.remove();
            toast.classList.add('toast-warning');
            phaseContainer.insertAdjacentElement('afterbegin', toast);
            setTimeout(() => toast.remove(), 6000);
        }

        // 渲染基金名称和规模
        if (fundInfo) {
            const area = document.getElementById('fundInfoArea');
            let scaleText = '暂无规模数据';
            if (fundInfo.scale !== undefined && fundInfo.scale !== null) {
                let num = parseFloat(fundInfo.scale);
                if (!isNaN(num)) scaleText = num.toFixed(2) + ' 亿元';
                else scaleText = String(fundInfo.scale);
            }
            area.innerHTML = `<div style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:12px;">
                <div><span class="fund-name">${escapeHtml(fundInfo.name)}</span><span class="fund-code">(${escapeHtml(code)})</span></div>
                <div class="fund-scale">📊 最新规模 <span>${escapeHtml(scaleText)}</span></div>
            </div>`;
            area.style.display = 'flex';
        }

        // 渲染表格
        if (phaseData.length) renderTable('phaseBody', phaseData);
        else document.getElementById('phaseBody').innerHTML = '<tr><td colspan="6" class="neutral">阶段涨幅数据暂不可用</td></tr>';

        if (quarterData.length) renderTable('quarterBody', quarterData);
        else document.getElementById('quarterBody').innerHTML = '<tr><td colspan="6" class="neutral">暂无季度涨幅数据</td></tr>';

        if (yearData.length) renderTable('yearBody', yearData);
        else document.getElementById('yearBody').innerHTML = '<tr><td colspan="6" class="neutral">暂无年度涨幅数据</td></tr>';
    }

    // ==================== 页面初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
        const searchBtn = document.getElementById('searchBtn');
        const inputEl = document.getElementById('fundCodeInput');
        const perform = () => queryFund(inputEl.value.trim());
        searchBtn.addEventListener('click', perform);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') perform(); });
        // 默认查询示例基金 004685
        queryFund('004685');
    });
</script>
</body>
</html>
