<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金核心数据全景查询 (纯净直连版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6; display: flex; justify-content: center;
            padding: 40px 10px; margin: 0; min-height: 100vh; box-sizing: border-box;
        }
        .container {
            background-color: #fff; padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); width: 100%; max-width: 850px;
        }
        h2 { color: #333; margin-top: 0; text-align: center; }
        .tip { color: #666; font-size: 14px; text-align: center; margin-bottom: 25px; line-height: 1.6;}
        
        .input-group { display: flex; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 12px 15px; border: 1px solid #d9d9d9; border-radius: 6px 0 0 6px;
            font-size: 16px; outline: none; text-align: center; letter-spacing: 2px; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.2); }
        button.search-btn {
            padding: 0 30px; background-color: #1677ff; color: white; border: none;
            border-radius: 0 6px 6px 0; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        button.search-btn:hover { background-color: #4096ff; }
        button.search-btn:disabled { background-color: #b5d5ff; cursor: not-allowed; }

        .msg { text-align: center; font-size: 14px; padding: 12px; border-radius: 6px; display: none; margin-bottom: 20px;}
        .msg.error { display: block; background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }

        #resultArea { display: none; }
        .base-info {
            background: #fafafa; padding: 20px; border-radius: 8px; margin-bottom: 20px;
            border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;
        }
        .fund-name { font-size: 19px; font-weight: bold; color: #333; }
        .fund-size { font-size: 15px; color: #666; }
        .fund-size span { color: #d9534f; font-size: 24px; font-weight: bold; margin-left: 5px; }

        /* 选项卡样式 */
        .tabs { display: flex; border-bottom: 2px solid #f0f0f0; margin-bottom: 15px; }
        .tab-btn {
            padding: 10px 20px; cursor: pointer; font-size: 15px; color: #666; border: none;
            background: transparent; position: relative; font-weight: 500; transition: 0.3s;
        }
        .tab-btn:hover { color: #1677ff; }
        .tab-btn.active { color: #1677ff; font-weight: bold; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background-color: #1677ff;
        }
        
        .tab-content { display: none; min-height: 150px; overflow-x: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 统一的美化表格 CSS */
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; white-space: nowrap; margin-bottom: 15px;}
        .data-table th { background-color: #f8f9fa; color: #555; padding: 14px 10px; border-bottom: 1px solid #e8e8e8; font-weight: bold;}
        .data-table td { padding: 14px 10px; border-bottom: 1px solid #f0f0f0; color: #333; }
        .data-table tr:hover td { background-color: #f5faff; }
        
        /* 锁定第一列 */
        .data-table th:first-child, .data-table td:first-child { 
            text-align: left; position: sticky; left: 0; background: #fff; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.03); z-index: 2; font-weight: bold; color: #444;
        }
        .data-table th:first-child { background: #f8f9fa; }
        
        .red { color: #f5222d !important; font-weight: bold; font-size: 14px;}
        .green { color: #52c41a !important; font-weight: bold; font-size: 14px;}
        
        /* 深度数据卡片 */
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px;}
        .card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: left; }
        .card h3 { margin: 0 0 10px 0; color: #1677ff; font-size: 15px; border-bottom: 1px dashed #eee; padding-bottom: 8px;}
        .card p { margin: 8px 0; color: #555; font-size: 14px;}
        .badge { background: #e6f4ff; color: #1677ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px;}
    </style>
</head>
<body>

<div class="container">
    <h2>📊 基金核心数据全景查询</h2>
    <p class="tip">
        全面采用 <b>Script 注入 + 算力解析引擎</b>，无视代理拦截！<br>
        <span style="color:#d9534f; font-weight:bold;">不仅重组官方原生表格，更支持极速生成历史季度/年度报表。</span>
    </p>
    
    <div class="input-group">
        <input type="text" id="fundCode" placeholder="输入6位代码，如004685" maxlength="6" onkeypress="handleEnter(event)">
        <button id="searchBtn" class="search-btn" onclick="queryFund()">闪电直查</button>
    </div>

    <div id="statusMsg" class="msg"></div>

    <div id="resultArea">
        <div class="base-info">
            <div class="fund-name" id="uiName">加载中...</div>
            <div class="fund-size">最新规模: <span id="uiSize">--</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stage')">阶段涨幅</button>
            <button class="tab-btn" onclick="switchTab('quarter')">季度涨幅</button>
            <button class="tab-btn" onclick="switchTab('year')">年度涨幅</button>
            <button class="tab-btn" onclick="switchTab('deep')">综合与经理</button>
        </div>

        <div id="tab-stage" class="tab-content active"></div>
        <div id="tab-quarter" class="tab-content"></div>
        <div id="tab-year" class="tab-content"></div>
        <div id="tab-deep" class="tab-content"></div>
    </div>
</div>

<script>
    function handleEnter(event) {
        if (event.key === "Enter") queryFund();
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    // 格式化工具
    function formatRate(val) {
        if (val === null || val === undefined || isNaN(val)) return '--';
        const num = parseFloat(val).toFixed(2);
        if (num > 0) return `<span class="red">+${num}%</span>`;
        if (num < 0) return `<span class="green">${num}%</span>`;
        return `<span style="font-weight:bold;">${num}%</span>`;
    }

    // ==========================================
    // 引擎 1：提取 阶段涨幅 (完美解析你截图里的 ul/li 结构)
    // ==========================================
    function fetchStageTable(code) {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = `https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jdzf&code=${code}&rt=${Date.now()}`;
            
            script.onload = () => {
                let stageHtml = '<div style="padding:40px; text-align:center; color:#999;">该基金暂无此区间数据</div>';
                
                if (typeof apidata !== 'undefined' && apidata.content) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(apidata.content, 'text/html');
                    
                    // 获取官方所有的 <ul> 列表，将其重新组装为标准的 <table>
                    const uls = doc.querySelectorAll('ul');
                    if (uls.length > 0) {
                        stageHtml = '<table class="data-table">';
                        uls.forEach((ul, index) => {
                            if (index === 0) {
                                stageHtml += '<thead><tr>';
                                ul.querySelectorAll('li').forEach(li => stageHtml += `<th>${li.innerHTML}</th>`);
                                stageHtml += '</tr></thead><tbody>';
                            } else {
                                stageHtml += '<tr>';
                                ul.querySelectorAll('li').forEach(li => {
                                    let text = li.textContent.trim();
                                    let num = parseFloat(text);
                                    // 给纯数字赋予红绿色，原网页的文本(优秀、不佳)保留原样
                                    if (text.includes('%') && !isNaN(num)) {
                                        if (num > 0) li.innerHTML = `<span class="red">${text}</span>`;
                                        else if (num < 0) li.innerHTML = `<span class="green">${text}</span>`;
                                    } else if (text.includes('↓')) {
                                        li.innerHTML = `<span style="color:#52c41a;">${text}</span>`;
                                    } else if (text.includes('↑')) {
                                        li.innerHTML = `<span style="color:#f5222d;">${text}</span>`;
                                    }
                                    stageHtml += `<td>${li.innerHTML}</td>`;
                                });
                                stageHtml += '</tr>';
                            }
                        });
                        stageHtml += '</tbody></table>';
                    }
                }
                document.head.removeChild(script);
                resolve(stageHtml);
            };
            script.onerror = () => { document.head.removeChild(script); resolve(null); };
            document.head.appendChild(script);
        });
    }

    // ==========================================
    // 引擎 2：本地算力引擎 (提取曲线，倒推计算每季度/年度数据)
    // ==========================================
    function calculateHistoricalReturns(dataArray, isRank = false) {
        let dict = { year: {}, quarter: {} };
        if (!dataArray || dataArray.length === 0) return dict;

        let firstVal = null;
        for (let i = 0; i < dataArray.length; i++) {
            let pt = dataArray[i];
            let timestamp = pt.x || pt[0];
            let val = pt.y !== undefined ? pt.y : pt[1];
            
            let date = new Date(timestamp);
            let y = date.getFullYear();
            let q = Math.ceil((date.getMonth() + 1) / 3);

            if (isRank) {
                dict.year[`${y}年度`] = { rank: val, total: pt.sc };
                dict.quarter[`${y}年${q}季度`] = { rank: val, total: pt.sc };
            } else {
                dict.year[`${y}年度`] = val;
                dict.quarter[`${y}年${q}季度`] = val;
                if (i === 0) firstVal = val;
            }
        }

        if (isRank) return dict;

        let results = { year: {}, quarter: {} };
        let years = Object.keys(dict.year).map(k => parseInt(k)).sort((a,b) => b-a);
        for (let y of years) {
            let endVal = dict.year[`${y}年度`];
            let startVal = dict.year[`${y-1}年度`] !== undefined ? dict.year[`${y-1}年度`] : firstVal;
            results[`${y}年度`] = ((1 + endVal/100) / (1 + startVal/100) - 1) * 100;
        }

        let quarters = Object.keys(dict.quarter).sort().reverse();
        for (let qKey of quarters) {
            let endVal = dict.quarter[qKey];
            let match = qKey.match(/(\d+)年(\d+)季度/);
            let y = parseInt(match[1]), q = parseInt(match[2]);
            
            let prevY = q === 1 ? y - 1 : y;
            let prevQ = q === 1 ? 4 : q - 1;
            let startVal = dict.quarter[`${prevY}年${prevQ}季度`] !== undefined ? dict.quarter[`${prevY}年${prevQ}季度`] : firstVal;
            results[qKey] = ((1 + endVal/100) / (1 + startVal/100) - 1) * 100;
        }
        return results;
    }

    function fetchCoreData(code) {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?v=${Date.now()}`;
            
            script.onload = () => {
                const data = { error: false, name: '未知基金', size: '--' };
                if (typeof fS_name !== 'undefined') data.name = fS_name;
                
                if (typeof Data_fluctuationScale !== 'undefined' && Data_fluctuationScale.series && Data_fluctuationScale.series.length > 0) {
                    data.size = Data_fluctuationScale.series[Data_fluctuationScale.series.length - 1].y + ' 亿元';
                } else if (typeof Data_fundSharesSize !== 'undefined' && Data_fundSharesSize.length > 0) {
                    data.size = Data_fundSharesSize[Data_fundSharesSize.length - 1][1] + ' 亿元';
                }

                // 计算季度和年度表格数据
                data.quarter = { fund: {}, avg: {}, hs300: {}, rank: {} };
                data.year = { fund: {}, avg: {}, hs300: {}, rank: {} };
                
                if (typeof Data_grandTotal !== 'undefined' && Data_grandTotal.length >= 3) {
                    let fundReturns = calculateHistoricalReturns(Data_grandTotal[0].data);
                    let avgReturns = calculateHistoricalReturns(Data_grandTotal[1].data);
                    let hs300Returns = calculateHistoricalReturns(Data_grandTotal[2].data);
                    
                    data.quarterKeys = Object.keys(fundReturns).filter(k => k.includes('季度')).slice(0, 6);
                    data.yearKeys = Object.keys(fundReturns).filter(k => k.includes('年度')).slice(0, 5);

                    data.quarterKeys.forEach(k => { data.quarter.fund[k] = fundReturns[k]; data.quarter.avg[k] = avgReturns[k]; data.quarter.hs300[k] = hs300Returns[k]; });
                    data.yearKeys.forEach(k => { data.year.fund[k] = fundReturns[k]; data.year.avg[k] = avgReturns[k]; data.year.hs300[k] = hs300Returns[k]; });
                }

                if (typeof Data_rateInSimilarType !== 'undefined') {
                    let ranks = calculateHistoricalReturns(Data_rateInSimilarType, true);
                    if(data.quarterKeys) data.quarterKeys.forEach(k => data.quarter.rank[k] = ranks.quarter[k]);
                    if(data.yearKeys) data.yearKeys.forEach(k => data.year.rank[k] = ranks.year[k]);
                }

                if (typeof Data_currentFundManager !== 'undefined' && Data_currentFundManager.length > 0) data.manager = Data_currentFundManager[0];
                if (typeof Data_performanceEvaluation !== 'undefined') data.eval = Data_performanceEvaluation;

                document.head.removeChild(script);
                resolve(data);
            };
            script.onerror = () => { document.head.removeChild(script); resolve({ error: true, msg: "基金代码不存在或已退市" }); };
            document.head.appendChild(script);
        });
    }

    // ==========================================
    // 动态渲染功能
    // ==========================================
    function buildTableHtml(keys, returnsData) {
        if (!keys || keys.length === 0) return '<div style="padding:40px; text-align:center; color:#999;">该基金暂无此区间数据</div>';
        
        let html = `<table class="data-table"><thead><tr><th>指标对比</th>`;
        keys.forEach(k => html += `<th>${k}</th>`);
        html += `</tr></thead><tbody>`;
        
        html += `<tr><td>阶段涨幅</td>`;
        keys.forEach(k => html += `<td>${formatRate(returnsData.fund[k])}</td>`);
        html += `</tr><tr><td>同类平均</td>`;
        keys.forEach(k => html += `<td>${formatRate(returnsData.avg[k])}</td>`);
        html += `</tr><tr><td>沪深300</td>`;
        keys.forEach(k => html += `<td>${formatRate(returnsData.hs300[k])}</td>`);
        html += `</tr><tr><td>同类排名</td>`;
        keys.forEach(k => {
            let r = returnsData.rank[k];
            if (r && r.rank) html += `<td><span style="color:#1677ff;font-weight:bold;">${r.rank}</span><span style="color:#999;font-size:12px;">/${r.total}</span></td>`;
            else html += `<td>--</td>`;
        });
        html += `</tr></tbody></table>`;
        return html;
    }

    async function queryFund() {
        const codeInput = document.getElementById('fundCode').value.trim();
        const searchBtn = document.getElementById('searchBtn');
        const statusMsg = document.getElementById('statusMsg');
        const resultArea = document.getElementById('resultArea');

        if (!/^\d{6}$/.test(codeInput)) {
            statusMsg.className = 'msg error';
            statusMsg.innerHTML = '❌ 请输入正确的6位纯数字基金代码！';
            statusMsg.style.display = 'block'; resultArea.style.display = 'none'; return;
        }

        searchBtn.disabled = true;
        statusMsg.style.display = 'none';
        
        try {
            // [终极双发] 同时提取原生表与核心算力数据
            const [coreData, stageHtml] = await Promise.all([
                fetchCoreData(codeInput),
                fetchStageTable(codeInput)
            ]);

            if (coreData.error) throw new Error(coreData.msg);

            resultArea.style.display = 'block';
            document.getElementById('uiName').innerText = coreData.name;
            document.getElementById('uiSize').innerHTML = `<span>${coreData.size}</span>`;

            // 1. 注入官方阶段涨幅表 (UL/LI 拼装的 Table)
            document.getElementById('tab-stage').innerHTML = stageHtml || '<div style="padding:40px; text-align:center; color:#999;">获取失败</div>';

            // 2. 注入本地算力推演的季度/年度表
            document.getElementById('tab-quarter').innerHTML = buildTableHtml(coreData.quarterKeys, coreData.quarter);
            document.getElementById('tab-year').innerHTML = buildTableHtml(coreData.yearKeys, coreData.year);

            // 3. 渲染深度评分与经理数据
            let deepHtml = '<div class="grid-cards">';
            if (coreData.manager) {
                deepHtml += `
                    <div class="card">
                        <h3>👨‍💼 现任经理: ${coreData.manager.name}</h3>
                        <p><strong>任职时长：</strong> <span class="badge">${coreData.manager.workTime}</span></p>
                        <p><strong>管理规模：</strong> <span>${coreData.manager.fundSize}</span></p>
                        <p><strong>综合评分：</strong> <span style="color:#d9534f; font-weight:bold;">${coreData.manager.power ? coreData.manager.power.avr : '--'} 分</span></p>
                    </div>`;
            }
            if (coreData.eval && coreData.eval.data) {
                let barHtml = '';
                for(let i=0; i<coreData.eval.categories.length; i++) {
                    barHtml += `
                        <div style="margin-bottom: 8px; display: flex; align-items: center;">
                            <span style="width: 60px; font-size: 13px; color: #555;">${coreData.eval.categories[i]}</span>
                            <div style="flex: 1; background: #f0f0f0; height: 8px; border-radius: 4px; overflow: hidden; margin: 0 10px;">
                                <div style="width: ${coreData.eval.data[i]}%; background: #1677ff; height: 8px;"></div>
                            </div>
                            <span style="width: 30px; font-size: 12px; color: #1677ff;">${coreData.eval.data[i]}</span>
                        </div>`;
                }
                deepHtml += `<div class="card"><h3>📊 基金综合评分 <span style="color:#d9534f; float:right;">${coreData.eval.avr} 分</span></h3>${barHtml}</div>`;
            }
            document.getElementById('tab-deep').innerHTML = deepHtml + '</div>';

        } catch (error) {
            statusMsg.className = 'msg error';
            statusMsg.innerHTML = `❌ ${error.message}`;
            statusMsg.style.display = 'block';
            resultArea.style.display = 'none';
        } finally {
            searchBtn.disabled = false;
        }
    }
</script>

</body>
</html>
